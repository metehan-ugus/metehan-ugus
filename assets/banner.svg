<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" role="img" aria-label="Metehan Uğuş — Software engineer building AI-native products">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f12"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#161616" stroke-width="0.6"/>
    </pattern>
  </defs>

  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#grid)"/>
  <rect width="1280" height="320" fill="url(#glow)"/>

  <!-- decorative monogram on right -->
  <g transform="translate(1060 60)" opacity="0.85">
    <circle cx="80" cy="80" r="78" fill="none" stroke="#6366f1" stroke-opacity="0.35" stroke-width="1"/>
    <circle cx="80" cy="80" r="64" fill="#0a0a0a" stroke="#1f1f1f"/>
    <text x="80" y="80" dy="0.36em" text-anchor="middle"
      font-family="ui-sans-serif, system-ui, sans-serif" font-size="50" font-weight="550"
      letter-spacing="-0.02em" fill="#fafafa">MU</text>
  </g>

  <!-- mono label -->
  <g transform="translate(72 88)">
    <circle cx="0" cy="0" r="4" fill="#6366f1"/>
    <text x="14" y="4"
      font-family="ui-monospace, SFMono-Regular, monospace" font-size="14"
      letter-spacing="0.08em" fill="#a3a3a3">SOFTWARE ENGINEER · ÇANAKKALE, TÜRKİYE</text>
  </g>

  <!-- name -->
  <text x="72" y="174"
    font-family="ui-sans-serif, system-ui, sans-serif" font-size="78" font-weight="550"
    letter-spacing="-0.02em" fill="#fafafa">Metehan Uğuş</text>

  <!-- tagline -->
  <text x="72" y="222"
    font-family="ui-sans-serif, system-ui, sans-serif" font-size="22"
    fill="#fafafa" fill-opacity="0.88">
    Building <tspan fill="#6366f1">AI-native</tspan> products for the web and mobile.
  </text>

  <!-- stats row -->
  <g transform="translate(72 270)" font-family="ui-monospace, monospace" font-size="13" fill="#737373">
    <text x="0" y="0">B.Eng. SE · 2024</text>
    <text x="148" y="0" fill="#3a3a3a">·</text>
    <text x="166" y="0">5+ yrs freelance</text>
    <text x="306" y="0" fill="#3a3a3a">·</text>
    <text x="324" y="0">B2B SaaS in production</text>
    <text x="510" y="0" fill="#3a3a3a">·</text>
    <text x="528" y="0">Most Original Graduation Project</text>
  </g>
</svg>
